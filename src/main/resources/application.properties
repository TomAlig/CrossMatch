spring.application.name=crossmatch

spring.datasource.url=jdbc:mysql://localhost:3307/crossmatch?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Open-Meteo API (clima, sin API key)
openmeteo.base-url=https://api.open-meteo.com

# Spring Security - JWT
# IMPORTANTE: cambia este valor en produccion por uno aleatorio largo (min 32 caracteres)
jwt.secret=crossmatch-clave-secreta-jwt-2026-cambiar-en-produccion 
# Cambiado a CrossMatch (En ej. bibliotecaduoc)