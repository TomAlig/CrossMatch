spring.application.name=crossmatch

spring.datasource.url=jdbc:mysql://localhost:3306/crossmatch?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / Valida si Flyway Falla
spring.jpa.hibernate.ddl-auto=validate  
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Crea las tablas basandose en db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true